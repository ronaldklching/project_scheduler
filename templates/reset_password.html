{% extends "base.html" %}

{% block title %}Reset Password · Installation Coordination System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h1 class="h3 mb-1">Reset Password</h1>
        <p class="text-muted mb-0">{{ user["username"] }} · {{ user["role"] }}</p>
    </div>
    <a class="btn btn-outline-secondary" href="{{ url_for('users_index') }}">Cancel</a>
</div>

<form method="post" class="card shadow-sm">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="new_password">New password</label>
                <input class="form-control" id="new_password" name="new_password" type="password" minlength="6" required>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="confirm_password">Confirm password</label>
                <input class="form-control" id="confirm_password" name="confirm_password" type="password" minlength="6" required>
            </div>
        </div>
    </div>
    <div class="card-footer bg-white text-end">
        <button class="btn btn-primary" type="submit">Reset Password</button>
    </div>
</form>
{% endblock %}
