{% extends "base.html" %}

{% block title %}Change Password · Installation Coordination System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h1 class="h3 mb-1">Change Password</h1>
        <p class="text-muted mb-0">{{ g.user["username"] }}</p>
    </div>
    <a class="btn btn-outline-secondary" href="{{ url_for('dashboard') }}">Cancel</a>
</div>

<form method="post" class="card shadow-sm">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label" for="current_password">Current password</label>
                <input class="form-control" id="current_password" name="current_password" type="password" required>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="new_password">New password</label>
                <input class="form-control" id="new_password" name="new_password" type="password" minlength="6" required>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="confirm_password">Confirm password</label>
                <input class="form-control" id="confirm_password" name="confirm_password" type="password" minlength="6" required>
            </div>
        </div>
    </div>
    <div class="card-footer bg-white text-end">
        <button class="btn btn-primary" type="submit">Change Password</button>
    </div>
</form>
{% endblock %}
